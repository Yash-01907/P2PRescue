<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P2P Rescue — Command Center</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: #0f0f23;
        color: #e0e0e0;
        min-height: 100vh;
      }
      .header {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        padding: 20px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #e63946;
      }
      .header h1 {
        color: #fff;
        font-size: 24px;
      }
      .header h1 span {
        color: #e63946;
      }
      .stats {
        display: flex;
        gap: 20px;
      }
      .stat {
        text-align: center;
        padding: 4px 16px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
      }
      .stat-value {
        font-size: 22px;
        font-weight: bold;
        color: #00d4ff;
      }
      .stat-label {
        font-size: 11px;
        color: #888;
        text-transform: uppercase;
      }
      .main {
        display: grid;
        grid-template-columns: 1fr 400px;
        height: calc(100vh - 80px);
      }
      .map-area {
        background: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: #555;
        border-right: 1px solid #0f3460;
      }
      .map-placeholder {
        text-align: center;
      }
      .map-placeholder .emoji {
        font-size: 80px;
        margin-bottom: 20px;
      }
      .sidebar {
        background: #16213e;
        overflow-y: auto;
        padding: 0;
      }
      .sidebar-header {
        padding: 16px 20px;
        font-size: 16px;
        font-weight: 600;
        color: #a8dadc;
        background: #1a1a2e;
        position: sticky;
        top: 0;
        z-index: 1;
        border-bottom: 1px solid #0f3460;
      }
      .packet-card {
        padding: 16px 20px;
        border-bottom: 1px solid #0f3460;
        border-left: 3px solid #e63946;
        cursor: pointer;
        transition: background 0.15s;
      }
      .packet-card:hover {
        background: rgba(230, 57, 70, 0.08);
      }
      .packet-card.new {
        animation: flash 1s ease;
      }
      @keyframes flash {
        0% {
          background: rgba(230, 57, 70, 0.3);
        }
        100% {
          background: transparent;
        }
      }
      .packet-id {
        color: #00d4ff;
        font-size: 13px;
        font-family: monospace;
      }
      .packet-msg {
        color: #fff;
        margin: 6px 0;
        font-size: 14px;
      }
      .packet-meta {
        color: #888;
        font-size: 12px;
        display: flex;
        gap: 12px;
      }
      .packet-location {
        color: #a8dadc;
        font-size: 12px;
        margin-top: 4px;
      }
      .connection-status {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
      }
      .connected {
        background: #065f46;
        color: #4ade80;
      }
      .disconnected {
        background: #7f1d1d;
        color: #f87171;
      }
      .empty-state {
        padding: 40px 20px;
        text-align: center;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>🚨 P2P Rescue — <span>Command Center</span></h1>
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="total-count">0</div>
          <div class="stat-label">SOS Signals</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="active-count">0</div>
          <div class="stat-label">Active</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="ws-status">—</div>
          <div class="stat-label">Feed</div>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="map-area">
        <div class="map-placeholder">
          <div class="emoji">🌍</div>
          <p>Map View — Integrate Leaflet.js or Google Maps</p>
          <p style="color: #444; margin-top: 8px; font-size: 14px">
            SOS locations will appear as pins here
          </p>
        </div>
      </div>

      <div class="sidebar">
        <div class="sidebar-header">📡 Live SOS Feed</div>
        <div id="feed">
          <div class="empty-state">Waiting for SOS signals...</div>
        </div>
      </div>
    </div>

    <div class="connection-status disconnected" id="conn-badge">
      ⬤ Disconnected
    </div>

    <script>
      const API_URL = 'http://localhost:3001';
      const WS_URL = 'ws://localhost:3001/ws';
      const feed = document.getElementById('feed');
      const totalCount = document.getElementById('total-count');
      const activeCount = document.getElementById('active-count');
      const wsStatus = document.getElementById('ws-status');
      const connBadge = document.getElementById('conn-badge');

      let packets = [];

      function renderPacket(p, isNew = false) {
        const card = document.createElement('div');
        card.className = `packet-card${isNew ? ' new' : ''}`;
        const loc =
          p.location && p.location.source !== 'NONE'
            ? `📍 ${p.location.latitude?.toFixed(
                4,
              )}°, ${p.location.longitude?.toFixed(4)}° (${p.location.source})`
            : '📍 Location unknown';
        card.innerHTML = `
                <div class="packet-id">🆘 ${p.packetId?.slice(0, 12)}...</div>
                <div class="packet-msg">${
                  p.payload?.message || 'No message'
                }</div>
                <div class="packet-meta">
                    <span>Hops: ${p.hopCount || 0}</span>
                    <span>Relays: ${p.relayChain?.length || 0}</span>
                    <span>${new Date(p.createdAt).toLocaleTimeString()}</span>
                </div>
                <div class="packet-location">${loc}</div>
            `;
        return card;
      }

      function renderFeed() {
        feed.innerHTML = '';
        if (packets.length === 0) {
          feed.innerHTML =
            '<div class="empty-state">Waiting for SOS signals...</div>';
          return;
        }
        packets.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        packets.forEach(p => feed.appendChild(renderPacket(p)));
        totalCount.textContent = packets.length;
        activeCount.textContent = packets.filter(
          p => p.status !== 'DELIVERED',
        ).length;
      }

      function connectWS() {
        const ws = new WebSocket(WS_URL);
        ws.onopen = () => {
          connBadge.textContent = '⬤ Connected';
          connBadge.className = 'connection-status connected';
          wsStatus.textContent = 'LIVE';
          wsStatus.style.color = '#4ade80';
        };
        ws.onmessage = event => {
          const data = JSON.parse(event.data);
          if (data.type === 'INITIAL_STATE') {
            packets = data.packets || [];
            renderFeed();
          } else if (data.type === 'NEW_SOS') {
            packets.unshift(data.packet);
            const card = renderPacket(data.packet, true);
            feed.insertBefore(card, feed.firstChild);
            totalCount.textContent = packets.length;
            activeCount.textContent = packets.filter(
              p => p.status !== 'DELIVERED',
            ).length;
            // Play notification sound
            try {
              new Audio(
                'data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQ==',
              ).play();
            } catch {}
          }
        };
        ws.onclose = () => {
          connBadge.textContent = '⬤ Disconnected';
          connBadge.className = 'connection-status disconnected';
          wsStatus.textContent = 'OFF';
          wsStatus.style.color = '#f87171';
          setTimeout(connectWS, 3000); // Auto-reconnect
        };
      }

      // Initial load via REST, then switch to WebSocket
      fetch(`${API_URL}/api/sos`)
        .then(r => r.json())
        .then(data => {
          packets = data.packets || [];
          renderFeed();
        })
        .catch(() => {});

      connectWS();
    </script>
  </body>
</html>
