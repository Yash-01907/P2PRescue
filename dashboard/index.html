<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P2P Rescue — Command Center</title>
    <!-- Leaflet CSS & JS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: #0f0f23;
        color: #e0e0e0;
        min-height: 100vh;
      }
      .header {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        padding: 20px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #e63946;
      }
      .header h1 {
        color: #fff;
        font-size: 24px;
      }
      .header h1 span {
        color: #e63946;
      }
      .stats {
        display: flex;
        gap: 20px;
      }
      .stat {
        text-align: center;
        padding: 4px 16px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
      }
      .stat-value {
        font-size: 22px;
        font-weight: bold;
        color: #00d4ff;
      }
      .stat-label {
        font-size: 11px;
        color: #888;
        text-transform: uppercase;
      }
      .main {
        display: grid;
        grid-template-columns: 1fr 400px;
        height: calc(100vh - 80px);
      }
      .map-area {
        background: #1a1a2e;
        position: relative;
        border-right: 1px solid #0f3460;
      }
      #map {
        width: 100%;
        height: 100%;
        background: #111; /* Dark theme map background */
      }
      /* Leaflet Dark Theme Overrides */
      .leaflet-layer,
      .leaflet-control-zoom-in,
      .leaflet-control-zoom-out,
      .leaflet-control-attribution {
        filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
      }
      .sidebar {
        background: #16213e;
        overflow-y: auto;
        padding: 0;
      }
      .sidebar-header {
        padding: 16px 20px;
        font-size: 16px;
        font-weight: 600;
        color: #a8dadc;
        background: #1a1a2e;
        position: sticky;
        top: 0;
        z-index: 1000;
        border-bottom: 1px solid #0f3460;
      }
      .packet-card {
        padding: 16px 20px;
        border-bottom: 1px solid #0f3460;
        border-left: 3px solid #e63946;
        cursor: pointer;
        transition: background 0.15s;
      }
      .packet-card:hover {
        background: rgba(230, 57, 70, 0.08);
      }
      .packet-card.new {
        animation: flash 1s ease;
      }
      @keyframes flash {
        0% {
          background: rgba(230, 57, 70, 0.3);
        }
        100% {
          background: transparent;
        }
      }
      .packet-id {
        color: #00d4ff;
        font-size: 13px;
        font-family: monospace;
      }
      .packet-msg {
        color: #fff;
        margin: 6px 0;
        font-size: 14px;
      }
      .packet-meta {
        color: #888;
        font-size: 12px;
        display: flex;
        gap: 12px;
      }
      .packet-location {
        color: #a8dadc;
        font-size: 12px;
        margin-top: 4px;
      }
      .connection-status {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        z-index: 9999;
      }
      .connected {
        background: #065f46;
        color: #4ade80;
      }
      .disconnected {
        background: #7f1d1d;
        color: #f87171;
      }
      .empty-state {
        padding: 40px 20px;
        text-align: center;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>🚨 P2P Rescue — <span>Command Center</span></h1>
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="total-count">0</div>
          <div class="stat-label">SOS Signals</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="active-count">0</div>
          <div class="stat-label">Active</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="ws-status">—</div>
          <div class="stat-label">Feed</div>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="map-area">
        <div id="map"></div>
      </div>

      <div class="sidebar">
        <div class="sidebar-header">📡 Live SOS Feed</div>
        <div id="feed">
          <div class="empty-state">Waiting for SOS signals...</div>
        </div>
      </div>
    </div>

    <div class="connection-status disconnected" id="conn-badge">
      ⬤ Disconnected
    </div>

    <script>
      const API_URL = 'http://localhost:3001';
      const WS_URL = 'ws://localhost:3001/ws';
      const feed = document.getElementById('feed');
      const totalCount = document.getElementById('total-count');
      const activeCount = document.getElementById('active-count');
      const wsStatus = document.getElementById('ws-status');
      const connBadge = document.getElementById('conn-badge');

      let packets = [];
      const markers = {}; // Store map markers by packetId

      // Initialize Leaflet Map (Centered roughly on New Delhi / Global)
      const map = L.map('map').setView([28.6139, 77.209], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap',
      }).addTo(map);

      // Custom red icon for SOS
      const sosIcon = L.icon({
        iconUrl:
          'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl:
          'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41],
      });

      function addMarkerToMap(p) {
        if (!p.location || !p.location.latitude || !p.location.longitude)
          return;
        if (markers[p.packetId]) return; // Already plotted

        const lat = p.location.latitude;
        const lng = p.location.longitude;

        const popupContent = `
          <div style="font-family:system-ui;color:#333;">
            <strong style="color:#d32f2f;">SOS: ${
              p.payload?.message || 'No msg'
            }</strong><br/>
            Injured: ${p.payload?.injuredCount || 0} | Water: ${
          p.payload?.waterAvailable ? 'Yes' : 'No'
        }<br/>
            Battery: ${p.payload?.batteryPercent || 0}%<br/>
            <small style="color:#666;">ID: ${p.packetId.slice(0, 8)}</small>
          </div>
        `;

        const marker = L.marker([lat, lng], { icon: sosIcon })
          .addTo(map)
          .bindPopup(popupContent);

        markers[p.packetId] = marker;

        // Auto-center map to latest SOS
        map.flyTo([lat, lng], 14, { animate: true });
      }

      function renderPacket(p, isNew = false) {
        const card = document.createElement('div');
        card.className = `packet-card${isNew ? ' new' : ''}`;
        const loc =
          p.location && p.location.source !== 'NONE'
            ? `📍 ${p.location.latitude?.toFixed(
                4,
              )}°, ${p.location.longitude?.toFixed(4)}° (${p.location.source})`
            : '📍 Location unknown';

        // Make card clickable to focus map
        card.onclick = () => {
          if (p.location && p.location.latitude) {
            map.flyTo([p.location.latitude, p.location.longitude], 16);
            if (markers[p.packetId]) markers[p.packetId].openPopup();
          }
        };

        card.innerHTML = `
                <div class="packet-id">🆘 ${p.packetId?.slice(0, 12)}...</div>
                <div class="packet-msg">${
                  p.payload?.message || 'No message'
                }</div>
                <div class="packet-meta">
                    <span>Hops: ${p.hopCount || 0}</span>
                    <span>Relays: ${p.relayChain?.length || 0}</span>
                    <span>${new Date(p.createdAt).toLocaleTimeString()}</span>
                </div>
                <div class="packet-location">${loc}</div>
            `;
        return card;
      }

      function renderFeed() {
        feed.innerHTML = '';
        if (packets.length === 0) {
          feed.innerHTML =
            '<div class="empty-state">Waiting for SOS signals...</div>';
          return;
        }

        // Plot all markers
        packets.forEach(p => addMarkerToMap(p));

        const sortedPackets = [...packets].sort(
          (a, b) => new Date(b.createdAt) - new Date(a.createdAt),
        );
        sortedPackets.forEach(p => feed.appendChild(renderPacket(p)));

        totalCount.textContent = packets.length;
        activeCount.textContent = packets.filter(
          p => p.status !== 'DELIVERED',
        ).length;

        // Fit bounds if we have markers
        const markerGroup = new L.featureGroup(Object.values(markers));
        if (Object.keys(markers).length > 0) {
          map.fitBounds(markerGroup.getBounds().pad(0.1));
        }
      }

      function connectWS() {
        const ws = new WebSocket(WS_URL);
        ws.onopen = () => {
          connBadge.textContent = '⬤ Connected';
          connBadge.className = 'connection-status connected';
          wsStatus.textContent = 'LIVE';
          wsStatus.style.color = '#4ade80';
        };
        ws.onmessage = event => {
          const data = JSON.parse(event.data);
          if (data.type === 'INITIAL_STATE') {
            packets = data.packets || [];
            renderFeed();
          } else if (data.type === 'NEW_SOS') {
            // Check for dedup in UI just in case
            if (!packets.find(p => p.packetId === data.packet.packetId)) {
              packets.unshift(data.packet);
              const card = renderPacket(data.packet, true);
              feed.insertBefore(card, feed.firstChild);
              addMarkerToMap(data.packet);

              totalCount.textContent = packets.length;
              activeCount.textContent = packets.filter(
                p => p.status !== 'DELIVERED',
              ).length;
              // Play notification sound
              try {
                new Audio(
                  'data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQ==',
                ).play();
              } catch {}
            }
          }
        };
        ws.onclose = () => {
          connBadge.textContent = '⬤ Disconnected';
          connBadge.className = 'connection-status disconnected';
          wsStatus.textContent = 'OFF';
          wsStatus.style.color = '#f87171';
          setTimeout(connectWS, 3000); // Auto-reconnect
        };
      }

      // Initial load via REST, then switch to WebSocket
      fetch(`${API_URL}/api/sos`)
        .then(r => r.json())
        .then(data => {
          packets = data.packets || [];
          renderFeed();
        })
        .catch(() => {});

      connectWS();
    </script>
  </body>
</html>
